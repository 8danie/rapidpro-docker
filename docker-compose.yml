version: '3'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
      - ./public_assets:/rapidpro/static
    ports:
      - "${RAPIDPRO_PORT}:80"
    depends_on:
      - rapidpro

  postgres:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    volumes:
      - ./postgres/init_dbs.sql:/docker-entrypoint-initdb.d/dev_dbs.sql
      - postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elastic:
    image: elasticsearch:8.14.0
    volumes:
      - elastic:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ingest.geoip.downloader.enabled: "false"
      logger.level: INFO
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s

  valkey:
    image: valkey/valkey:8.0-alpine
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 2s

  dynamo:
    image: amazon/dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -port 6000"
    volumes:
      - dynamo:/home/dynamodblocal/data
    ports:
      - "6000:6000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -v http://dynamo:6000" ]
      interval: 10s
      timeout: 5s
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s

  rapidpro:
    image: nyaruka/rapidpro:stable
    command: ["webapp"]
    depends_on:
      postgres:
        condition: service_healthy
      elastic:
        condition: service_healthy
      valkey:
        condition: service_healthy
      dynamo:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./public_assets:/rapidpro/sitestatic
      - ./settings_fixed.py:/rapidpro/temba/settings.py
    environment:
      # On construit l'URL DB dynamiquement pour éviter les erreurs de copier-coller
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      REMOTE_CONTAINERS: "true"
      CSRF_TRUSTED_ORIGINS: ${DOMAIN_NAME}
      ALLOWED_HOSTS: ${DOMAIN_IP}
      DOMAIN_NAME: ${DOMAIN_NAME}
      SECRET_KEY: ${SECRET_KEY}
      MAILROOM_URL: ${MAILROOM_URL}
      MAILROOM_AUTH_TOKEN: ${MAILROOM_AUTH_TOKEN}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
    healthcheck:
      test: curl -s http://localhost:8000 >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s

  celery:
    image: nyaruka/rapidpro:stable
    restart: unless-stopped
    command: ["celery"]
    depends_on:
      rapidpro:
        condition: service_healthy
    volumes:
      - ./settings_fixed.py:/rapidpro/temba/settings.py
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DOMAIN_NAME: ${DOMAIN_NAME}
      REDIS_URL: ${REDIS_URL}
      REMOTE_CONTAINERS: "true"
      MAILROOM_URL: ${MAILROOM_URL}
      MAILROOM_AUTH_TOKEN: ${MAILROOM_AUTH_TOKEN}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_BACKEND: ${EMAIL_BACKEND}

  mailroom:
    image: nyaruka/mailroom:stable
    # build: ... (Laissez l'image stable si possible, sinon décommentez build)
    depends_on:
      rapidpro:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      MAILROOM_ADDRESS: 0.0.0.0
      # Attention au sslmode=disable important pour postgres local
      MAILROOM_DB: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      # Mailroom utilise la DB 15 de Redis par convention
      MAILROOM_VALKEY: valkey://valkey:6379/15
      MAILROOM_ELASTIC: http://elastic:9200
      MAILROOM_AUTH_TOKEN: ${MAILROOM_AUTH_TOKEN}
      MAILROOM_S3_ENDPOINT: http://minio:9000
      MAILROOM_S3_SESSIONS_BUCKET: ${S3_BUCKET_SESSIONS}
      MAILROOM_S3_ATTACHMENTS_BUCKET: ${S3_BUCKET_ATTACHMENTS}
      MAILROOM_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      MAILROOM_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MAILROOM_S3_MINIO: "true"
      MAILROOM_LOG_LEVEL: info

  courier:
    image: nyaruka/courier:stable
    depends_on:
      rapidpro:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      COURIER_ADDRESS: 0.0.0.0
      COURIER_DB: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      COURIER_VALKEY: valkey://valkey:6379/15
      COURIER_AUTH_TOKEN: ${MAILROOM_AUTH_TOKEN}
      COURIER_S3_ENDPOINT: http://minio:9000
      COURIER_S3_ATTACHMENTS_BUCKET: ${S3_BUCKET_ATTACHMENTS}
      COURIER_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      COURIER_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      COURIER_S3_MINIO: "true"
      COURIER_LOG_LEVEL: info

  indexer:
    image: nyaruka/indexer:stable
    depends_on:
      rapidpro:
        condition: service_healthy
    environment:
      INDEXER_DB: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      INDEXER_ELASTIC_URL: http://elastic:9200
      INDEXER_LOG_LEVEL: info

volumes:
  postgres:
    driver: local
  elastic:
    driver: local
  valkey:
    driver: local
  dynamo:
    driver: local
  minio:
    driver: local

# kannel/kannel.conf

# ---------------------------------------------------------
# CORE (Le noyau de Kannel)
# ---------------------------------------------------------
group = core
admin-port = 13000
smsbox-port = 13001
admin-password = bar
status-password = bar
log-file = "/var/log/kannel/kannel.log"
log-level = 1
box-allow-ip = "*.*.*.*"
store-file = "/var/spool/kannel/kannel.store"
# ---------------------------------------------------------
# SMSC (Connexion aux opérateurs)
# ---------------------------------------------------------

# ICI : C'est un FAUX opérateur pour vos tests locaux (Loopback)
# Tout ce que vous envoyez vous revient immédiatement.
group = smsc
smsc = http
system-type = generic
smsc-id = FAKE_LUMITEL
port = 13014
connect-allow-ip = 127.0.0.1

# --- FUTURE CONFIGURATION LUMITEL (EXEMPLE SMPP) ---
# Décommentez et remplissez ceci quand vous aurez les infos de Lumitel
# group = smsc
# smsc = smpp
# smsc-id = lumitel
# host = 196.x.x.x
# port = 2775
# smsc-username = "votre_user"
# smsc-password = "votre_password"
# system-type = "votre_system_type"

# ---------------------------------------------------------
# SMSBOX (Gestion des SMS HTTP)
# ---------------------------------------------------------
group = smsbox
bearerbox-host = 127.0.0.1
sendsms-port = 13013
global-sender = 12345
log-file = "/var/log/kannel/smsbox.log"
log-level = 1

# ---------------------------------------------------------
# SENDSMS-USER (RapidPro utilise ça pour envoyer)
# ---------------------------------------------------------
group = sendsms-user
username = rapidpro
password = temba
concatenation = true
max-messages = 3

# ---------------------------------------------------------
# SMS-SERVICE (Réception des SMS entrants)
# ---------------------------------------------------------
# C'est ici que Kannel transmet les SMS reçus vers RapidPro (Mailroom)
# RapidPro vous donnera une URL spécifique plus tard, mais voici un exemple générique.
group = sms-service
keyword = default
# Attention : mailroom est le nom du service dans docker-compose
# %p = numéro téléphone envoyeur, %a = message texte, %P = numéro destinataire (shortcode)
get-url = "http://mailroom:8090/in/kannel/?id=%p&text=%a&to=%P&from=%p&smsc=%i"
max-messages = 0
concatenation = true
